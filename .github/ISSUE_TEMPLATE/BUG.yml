name: Bug report
description: Report a bug or unexpected behavior

labels: ["bug"]
type: Bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please provide a [Minimal Reproducible Example](https://stackoverflow.com/help/minimal-reproducible-example) and include any logs, screenshots, or error traces that help us reproduce the problem.
  - type: dropdown
    attributes:
      label: Area
      description: Which part of the repo is affected?
      options:
        - tool / detection logic
        - provider runtime / deploy
        - manifest / schema
        - CI / workflows
        - documentation
        - other
    validations:
      required: true
  - type: input
    attributes:
      label: Tool slug (if applicable)
      placeholder: coinflip-tool
  - type: textarea
    attributes:
      label: Describe the issue
      description: A concise description of the issue and how we can reproduce it.
      placeholder: Describe the issue step by step
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Where did the problem occur?
      value: |
        - Local / staging / production:
        - `openlatch-provider` version:
        - Tool version:
    validations:
      required: false
