changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: New Tools
      labels:
        - new-tool
    - title: New Features
      labels:
        - enhancement
        - feature
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
    - title: CI / Deploy
      labels:
        - ci
    - title: Other Changes
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
