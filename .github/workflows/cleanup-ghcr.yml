name: Cleanup GHCR

on:
  schedule:
    # 03:17 UTC every Monday
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  packages: write

concurrency:
  group: cleanup-ghcr
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: openlatch-sectools
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 5

      - name: Trim main-<sha> versions to last 20
        uses: actions/delete-package-versions@v5
        with:
          package-name: openlatch-sectools
          package-type: container
          min-versions-to-keep: 20
          ignore-versions: '^(latest|staging-.*|v\d.*)$'
