name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: PR - Detect Changed Tools
    runs-on: ubuntu-latest
    outputs:
      python_tools: ${{ steps.filter.outputs.python_tools_files }}
      node_tools: ${{ steps.filter.outputs.node_tools_files }}
      manifests: ${{ steps.filter.outputs.manifests }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            python_tools_files:
              - 'tools/**/pyproject.toml'
              - 'tools/**/src/**'
              - 'tools/**/tests/**'
              - 'tools/**/uv.lock'
            node_tools_files:
              - 'tools/**/package.json'
              - 'tools/**/src/**/*.ts'
              - 'tools/**/tests/**/*.ts'
              - 'tools/**/pnpm-lock.yaml'
            manifests:
              - 'openlatch-provider.yaml'
              - 'tools/**/openlatch-tool.yaml'
            docker:
              - 'Dockerfile'
              - '.dockerignore'
              - 'package.json'
              - 'package-lock.json'

  python-lint-test:
    name: PR - Python Lint + Test
    needs: changes
    if: needs.changes.outputs.python_tools != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Lint + test each changed Python tool
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          declare -A tools_seen
          for f in ${{ needs.changes.outputs.python_tools }}; do
            tool_dir=$(echo "$f" | awk -F/ '{print $1"/"$2}')
            [ -d "$tool_dir" ] || continue
            tools_seen[$tool_dir]=1
          done
          for tool_dir in "${!tools_seen[@]}"; do
            slug=$(basename "$tool_dir")
            echo "::group::$slug"
            (
              cd "$tool_dir"
              uv sync --frozen --extra dev
              uv run ruff check .
              uv run pytest -q
            )
            echo "::endgroup::"
            if [ -f "$tool_dir/coverage.xml" ] && [ -n "${CODECOV_TOKEN:-}" ]; then
              echo "Uploading coverage for $slug"
            fi
          done
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  node-lint-test:
    name: PR - Node Lint + Test
    needs: changes
    if: needs.changes.outputs.node_tools != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install + lint + test each changed Node tool
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          for f in ${{ needs.changes.outputs.node_tools }}; do
            tool_dir=$(echo "$f" | awk -F/ '{print $1"/"$2}')
            [ -d "$tool_dir" ] || continue
            (cd "$tool_dir" && pnpm lint && pnpm test -- --coverage)
          done
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  manifest-validate:
    name: PR - Manifest Validate
    needs: changes
    if: needs.changes.outputs.manifests != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --omit=dev
      - name: Validate each tool manifest
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for m in tools/*/openlatch-tool.yaml; do
            echo "::group::publish --tool $m --dry-run"
            npx -y openlatch-provider publish --tool "$m" --dry-run --skip-preflight
            echo "::endgroup::"
          done
      - name: Validate provider manifest
        run: npx -y openlatch-provider register --provider openlatch-provider.yaml --dry-run --skip-preflight

  docker-build:
    name: PR - Docker Build
    needs: changes
    if: needs.changes.outputs.docker != '' || needs.changes.outputs.python_tools != '' || needs.changes.outputs.node_tools != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image (cache-only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=sectools-pr
          cache-to: type=gha,mode=max,scope=sectools-pr

  all-checks:
    name: PR - All Checks
    needs: [python-lint-test, node-lint-test, manifest-validate, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for r in \
            "${{ needs.python-lint-test.result }}" \
            "${{ needs.node-lint-test.result }}" \
            "${{ needs.manifest-validate.result }}" \
            "${{ needs.docker-build.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) fail=1 ;;
            esac
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs are green or skipped"
