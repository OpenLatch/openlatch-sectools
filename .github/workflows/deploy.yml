name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "tools/**"
      - "openlatch-provider.yaml"
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "package-lock.json"
      - "fly/**"
      - ".github/workflows/deploy.yml"
      - "scripts/render-staging-manifest.py"
      - "scripts/register-and-sync-secrets.sh"
  workflow_dispatch:
    inputs:
      skip_production:
        description: "Skip production deploy (staging-only run)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/openlatch/openlatch-sectools
  FLY_IMAGE: registry.fly.io/openlatch-sectools
  IMAGE_TAG: main-${{ github.sha }}

jobs:
  build-and-push:
    name: Deploy - Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Fly registry
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build and push to both registries
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.FLY_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FLY_IMAGE }}:latest
          cache-from: type=gha,scope=sectools-deploy
          cache-to: type=gha,mode=max,scope=sectools-deploy

      - name: Generate SBOM (Syft) for GHCR image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_IMAGE }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          upload-artifact: true

      - name: Attest build provenance (Cosign keyless via OIDC)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy-staging:
    name: Deploy - Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install pinned provider locally
        run: npm ci --omit=dev

      - name: Render staging manifest
        run: python scripts/render-staging-manifest.py openlatch-provider.yaml /tmp/staging-provider.yaml

      - name: Register against platform (idempotent)
        id: register
        env:
          OPENLATCH_TOKEN: ${{ secrets.OPENLATCH_TOKEN }}
          OPENLATCH_API_URL: https://api.openlatch.ai
        run: |
          set -euo pipefail
          bash scripts/register-and-sync-secrets.sh \
            --provider /tmp/staging-provider.yaml \
            --fly-app openlatch-sectools-staging

      - name: Deploy to Fly (staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly/fly.staging.toml \
            --image ${{ env.FLY_IMAGE }}:${{ env.IMAGE_TAG }} \
            --wait-timeout 15m

  smoke-staging:
    name: Deploy - Smoke Staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --omit=dev

      - name: Wait for /healthz on staging
        shell: bash
        run: |
          set -euo pipefail
          url=https://sectools-staging.openlatch.ai/healthz
          for attempt in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" || true)
            echo "attempt=$attempt code=$code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "::error::staging /healthz never returned 200"
          exit 1

      - name: Trigger synthetic event against staging
        env:
          OPENLATCH_TOKEN: ${{ secrets.OPENLATCH_TOKEN }}
          OPENLATCH_API_URL: https://api.openlatch.ai
        run: |
          set -euo pipefail
          # Find the shell-guard binding ID on staging and fire a known
          # dangerous command — exercises a real deny round-trip.
          bnd=$(npx -y openlatch-provider bindings list --output json | jq -r '.[] | select(.tool_slug=="shell-guard" and (.provider_slug|test("staging"))) | .id' | head -n1)
          if [ -z "$bnd" ]; then
            echo "::error::no staging shell-guard binding found"
            exit 1
          fi
          npx -y openlatch-provider trigger pre_tool_use \
            --binding "$bnd" \
            --tool Bash \
            --input 'rm -rf /'

  deploy-production:
    name: Deploy - Production
    needs: smoke-staging
    if: github.event.inputs.skip_production != 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: npm ci --omit=dev

      - name: Register against platform (idempotent)
        env:
          OPENLATCH_TOKEN: ${{ secrets.OPENLATCH_TOKEN }}
          OPENLATCH_API_URL: https://api.openlatch.ai
        run: |
          bash scripts/register-and-sync-secrets.sh \
            --provider openlatch-provider.yaml \
            --fly-app openlatch-sectools

      - name: Deploy to Fly (production)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly/fly.production.toml \
            --image ${{ env.FLY_IMAGE }}:${{ env.IMAGE_TAG }} \
            --wait-timeout 20m

  post-deploy-cleanup:
    name: Deploy - Post-Deploy Cleanup
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Destroy stale machines (different image digest)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: bash scripts/verify-no-stale-machines.sh openlatch-sectools
