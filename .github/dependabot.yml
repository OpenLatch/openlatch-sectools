version: 2
updates:
  # Root npm dependencies (pins @openlatch/provider)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "area/runtime"]
    groups:
      provider-runtime:
        patterns: ["@openlatch/*"]
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # Per-tool Python dependencies — add a new entry when a Python tool lands
  - package-ecosystem: "pip"
    directory: "/tools/pii-scanner"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/pii-scanner"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/secrets-detector"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/secrets-detector"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/shell-guard"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/shell-guard"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/prompt-injection-guard"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/prompt-injection-guard"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/tool-integrity"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/tool-integrity"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/attack-path-guard"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/attack-path-guard"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/tools/config-guard"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/config-guard"]
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    groups:
      gha-all:
        patterns: ["*"]

  # Docker base image
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "area/runtime"]
