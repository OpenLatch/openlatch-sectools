codecov:
  notify:
    require_ci_to_pass: true
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 75%
        threshold: 1%
        if_ci_failed: error

# Per-tool flags. Add a new entry per tool when it lands. Tool flag names
# match the tool slug so coverage isolates cleanly.
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 70%
      - type: patch
        target: 75%
  individual_flags:
    - name: pii-scanner
      paths:
        - tools/pii-scanner/src/
    - name: secrets-detector
      paths:
        - tools/secrets-detector/src/
    - name: shell-guard
      paths:
        - tools/shell-guard/src/
    - name: prompt-injection-guard
      paths:
        - tools/prompt-injection-guard/src/
    - name: tool-integrity
      paths:
        - tools/tool-integrity/src/
    - name: attack-path-guard
      paths:
        - tools/attack-path-guard/src/
    - name: config-guard
      paths:
        - tools/config-guard/src/

flags:
  pii-scanner:
    paths:
      - tools/pii-scanner/src/
    carryforward: true
  secrets-detector:
    paths:
      - tools/secrets-detector/src/
    carryforward: true
  shell-guard:
    paths:
      - tools/shell-guard/src/
    carryforward: true
  prompt-injection-guard:
    paths:
      - tools/prompt-injection-guard/src/
    carryforward: true
  tool-integrity:
    paths:
      - tools/tool-integrity/src/
    carryforward: true
  attack-path-guard:
    paths:
      - tools/attack-path-guard/src/
    carryforward: true
  config-guard:
    paths:
      - tools/config-guard/src/
    carryforward: true

comment:
  layout: "header, reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tools/**/tests/**"
  - "scripts/**"
  - ".github/**"
  - "fly/**"
  - "Dockerfile"
