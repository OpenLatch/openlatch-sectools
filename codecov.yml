codecov:
  notify:
    require_ci_to_pass: true
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 75%
        threshold: 1%
        if_ci_failed: error

# Per-tool flags. Add a new entry per tool when it lands. Tool flag names
# match the tool slug so coverage isolates cleanly.
flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 70%
      - type: patch
        target: 75%
  individual_flags:
    - name: coinflip-tool
      paths:
        - tools/coinflip-tool/src/

flags:
  coinflip-tool:
    paths:
      - tools/coinflip-tool/src/
    carryforward: true

comment:
  layout: "header, reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tools/**/tests/**"
  - "scripts/**"
  - ".github/**"
  - "fly/**"
  - "Dockerfile"
