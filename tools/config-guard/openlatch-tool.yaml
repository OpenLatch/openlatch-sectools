# `kind: Tool` manifest (v2) — owned by the tool author.
# The operator-side `openlatch-provider.yaml` at the repo root composes this
# tool into the deployed sectools provider via `tool_paths:`.
schema_version: 2
kind: Tool

editor:
  slug: openlatch
  display_name: OpenLatch
  description: |
    Built-in security tools that ship with the OpenLatch platform.
    Open-sourced, written against the public `openlatch-tool-sdk` —
    the same SDK any community author uses.
  homepage_url: https://openlatch.ai
  docs_url: https://docs.openlatch.ai

tools:
  - slug: config-guard
    version: 0.1.0
    license: apache-2.0
    description: |
      Detects configuration-plane threats across MCP server definitions,
      Skills, rules files, and hooks (poisoning, rug-pulls, prompt
      injection, RCE, openlatch-hook disabling).
    hooks_supported:
      - pre_tool_use
    agents_supported:
      - claude-code
    capabilities:
      - threat_category: configuration_threat
        execution_mode: sync
        declared_latency_p95_ms: 80
        needs_raw_payload: true
        needs_prior_config_state: true
    process:
      command: ["uv", "run", "uvicorn", "config_guard:app", "--port", "8087"]
      cwd: "."
      env: {}
      health_check:
        http:
          port: 8087
          path: /healthz
      restart:
        max_restarts: 5
        window_seconds: 60
