# `kind: Tool` manifest (v2) — owned by the tool author.
# The operator-side `openlatch-provider.yaml` at the repo root composes this
# tool into the deployed sectools provider via `tool_paths:`.
schema_version: 2
kind: Tool

editor:
  slug: openlatch
  display_name: OpenLatch
  description: |
    Built-in security tools that ship with the OpenLatch platform.
    Open-sourced, written against the public `openlatch-tool-sdk` —
    the same SDK any community author uses.
  homepage_url: https://openlatch.ai
  docs_url: https://docs.openlatch.ai

tools:
  - slug: shell-guard
    version: 0.1.0
    license: apache-2.0
    description: |
      Pure-Python detection of dangerous and exfiltration shell commands
      (destructive rm, fork bombs, disk wipes, suid, curl|sh, reverse
      shells, data exfil) with 5-axis risk scoring.
    hooks_supported:
      - pre_tool_use
    agents_supported:
      - claude-code
    capabilities:
      - threat_category: shell_dangerous
        execution_mode: sync
        declared_latency_p95_ms: 40
        needs_raw_payload: false
      - threat_category: shell_exfiltration
        execution_mode: sync
        declared_latency_p95_ms: 40
        needs_raw_payload: false
    process:
      command: ["uv", "run", "uvicorn", "shell_guard:app", "--port", "8083"]
      cwd: "."
      env: {}
      health_check:
        http:
          port: 8083
          path: /healthz
      restart:
        max_restarts: 5
        window_seconds: 60
