# `kind: Tool` manifest (v2) — owned by the tool author.
# The operator-side `openlatch-provider.yaml` at the repo root composes this
# tool into the deployed sectools provider via `tool_paths:`.
schema_version: 2
kind: Tool

editor:
  slug: openlatch
  display_name: OpenLatch
  description: |
    Built-in security tools that ship with the OpenLatch platform.
    Open-sourced, written against the public `openlatch-tool-sdk` —
    the same SDK any community author uses.
  homepage_url: https://openlatch.ai
  docs_url: https://docs.openlatch.ai

tools:
  - slug: prompt-injection-guard
    version: 0.1.0
    license: apache-2.0
    description: |
      Detects prompt-injection attacks targeting AI agents — both
      user-input injections (INJECT-IGNORE-INSTRUCTIONS, role overrides,
      system-prompt leakage) and tool-response poisoning (malicious
      instructions embedded in tool output). Regex prefilter with optional
      DeBERTa-based secondary scan via llm-guard (lazy/opt-in).
    hooks_supported:
      - pre_tool_use
    agents_supported:
      - claude-code
    capabilities:
      - threat_category: injection_user_input
        execution_mode: sync
        declared_latency_p95_ms: 120
        needs_raw_payload: false
      - threat_category: injection_tool_response
        execution_mode: sync
        declared_latency_p95_ms: 120
        needs_raw_payload: false
    # Author's default process — the operator can layer
    # `process_override:` on top from the root provider manifest.
    process:
      command: ["uv", "run", "uvicorn", "prompt_injection_guard:app", "--port", "8084"]
      cwd: "."
      env: {}
      health_check:
        http:
          port: 8084
          path: /healthz
      restart:
        max_restarts: 5
        window_seconds: 60
