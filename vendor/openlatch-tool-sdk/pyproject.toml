[project]
name = "openlatch-tool-sdk"
version = "1.0.0"
description = "OpenLatch detection-tool SDK — Standard Webhooks v1 verify/sign + FastAPI decorator."
license = {text = "Apache-2.0"}
authors = [{name = "OpenLatch", email = "hello@openlatch.ai"}]
requires-python = ">=3.11"
readme = "README.md"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.27",
    "cryptography>=42",
    "pydantic>=2.6",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.115"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "fastapi>=0.115",
    "ruff>=0.6",
]

[project.urls]
Homepage = "https://openlatch.ai"
Repository = "https://github.com/OpenLatch/openlatch-provider"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openlatch_tool_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
